name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: bucketctl

jobs:
  build-linux:
    name: ${{ matrix.archive_suffix }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            archive_suffix: linux-amd64
          - target: aarch64-unknown-linux-musl
            archive_suffix: linux-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${BIN_NAME} dist/${BIN_NAME}
          tar -C dist -czf ${BIN_NAME}-${TAG}-${{ matrix.archive_suffix }}.tar.gz ${BIN_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.archive_suffix }}
          path: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz

  build-darwin:
    name: darwin-arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/${BIN_NAME} dist/${BIN_NAME}
          tar -C dist -czf ${BIN_NAME}-${TAG}-darwin-arm64.tar.gz ${BIN_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BIN_NAME }}-darwin-arm64
          path: ${{ env.BIN_NAME }}-${{ github.ref_name }}-darwin-arm64.tar.gz

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-darwin

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -name '*.tar.gz' -exec cp {} release/ \;

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
